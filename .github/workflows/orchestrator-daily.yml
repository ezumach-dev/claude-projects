name: StockAdvaisor Orchestrator

on:
  # Fires only when StockAdvaisor Daily completes — that workflow runs Mon-Fri only,
  # so this orchestrator is inherently weekday-only.
  workflow_run:
    workflows: ["StockAdvaisor Daily"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  orchestrate:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    timeout-minutes: 15
    defaults:
      run:
        working-directory: stock-advisor

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: stock-advisor/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run orchestrator
        env:
          KIE_API_KEY: ${{ secrets.KIE_API_KEY }}
        run: python orchestrator.py

      - name: Commit insights + memory
        if: always()
        run: |
          git config user.name "stockadvaisor-bot"
          git config user.email "stockadvaisor-bot@users.noreply.github.com"
          git add data/ memory.json || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "orchestrator: $(date -u +%Y-%m-%d) insights"
            git push
          fi
