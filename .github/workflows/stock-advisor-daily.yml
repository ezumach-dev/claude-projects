name: StockAdvisor Daily

on:
  schedule:
    # 6:00 AM PST (14:00 UTC during PST, 13:00 UTC during PDT).
    # Github cron is UTC. 13:00 UTC = 6 AM PDT / 5 AM PST.
    # We pick 14:00 UTC so PST users get 6am year-round-ish; adjust after first DST boundary.
    - cron: '0 14 * * 1-5'
  workflow_dispatch:
    inputs:
      stage_a:
        description: 'Stage A mode (3 tickers only)'
        required: false
        default: 'true'

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: stock-advisor
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: stock-advisor/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run stock_advisor.py
        env:
          STAGE_A: ${{ github.event.inputs.stage_a || 'true' }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          SMTP_FROM_NAME: ${{ secrets.SMTP_FROM_NAME }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          KIE_API_KEY: ${{ secrets.KIE_API_KEY }}
        run: python stock_advisor.py

      - name: Commit data + error files
        if: always()
        run: |
          git config user.name "stockadvisor-bot"
          git config user.email "stockadvisor-bot@users.noreply.github.com"
          git add data/ || true
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "data: $(date -u +%Y-%m-%d) run"
            git push
          fi
